<div class="container">
  <h1>Feature Flags</h1>

  <!-- Create Feature Flag -->
  <section class="create-flag">
    <form [formGroup]="form" (ngSubmit)="create()">
      <input type="text" placeholder="Key" formControlName="key" />

      <input type="text" placeholder="Value" formControlName="value" />

      <mat-form-field appearance="fill">
  <mat-label>Allowed Roles</mat-label>
  <mat-select formControlName="allowedRoles" multiple>
    <mat-option *ngFor="let role of roles" [value]="role">
      {{ role }}
    </mat-option>
  </mat-select>
</mat-form-field>

      <textarea
        placeholder="Description"
        formControlName="description"
      ></textarea>

      <label>
        <input type="checkbox" formControlName="enabled" />
        Enabled
      </label>

      <button type="submit" [disabled]="form.invalid">Create</button>
    </form>
  </section>

  <!-- Flags List -->
  <section class="flags-list">
    <app-feature-flags-list
      [flags]="flags$ | async"
      (toggle)="toggle($event)"
      (valueChange)="updateValue($event)"
      (delete)="delete($event)"
    ></app-feature-flags-list>
  </section>
</div>
